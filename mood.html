<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruh Haline Göre Seç - Waiterly</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #fafafa; margin: 0; padding: 40px 20px; text-align: center; color: #333; }
        h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .mood-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 800px; margin: 0 auto 40px; }
        .mood-btn { background: white; border: 2px solid #e0e0e0; padding: 15px 25px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .mood-btn:hover { border-color: #9c27b0; transform: translateY(-3px); box-shadow: 0 6px 15px rgba(156,39,176,0.2); }
        .mood-btn.active { background: #9c27b0; color: white; border-color: #9c27b0; }
        .results-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: left; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .product-info { padding: 20px; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 18px; margin: 0 0 10px; }
        .product-desc { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.4; }
        .product-price { font-weight: bold; color: #9c27b0; font-size: 16px; }
        .back-link { display: inline-block; margin-top: 40px; color: #666; text-decoration: none; font-weight: bold; }
        .back-link:hover { color: #111; }
    </style>
</head>
<body>

    <h1>Şu an nasıl hissediyorsun?</h1>
    <p>Ruh halini seç, sana en uygun ürünleri önerelim.</p>

    <div class="mood-container" id="mood-buttons-container">
        </div>

    <h2 id="results-title" style="display:none; font-family:'Playfair Display',serif; margin-bottom:20px;">Senin İçin Önerilerimiz</h2>
    
    <div class="results-container" id="results-container">
        </div>

    <a href="real.html" class="back-link">← Ana Menüye Dön</a>

    <script src="mood.js"></script>
</body>
</html>
