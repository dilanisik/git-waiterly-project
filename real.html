<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiterly</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* MAIN PAGE STYLES */
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
        background-color: #f9f9f9;
        padding-bottom: 250px;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
        border: 1px solid #ccc;
        background-color: white;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #f0f0f0;
      }

      /* BOTTOM DEV PANEL ONLY */
      .bottom-controls-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        width: 100%;
        max-width: 600px;
        z-index: 1000;
        pointer-events: none;
      }

      .dev-panel {
        margin-top: 20px;
        padding: 15px;
        border: 2px dashed #ff4c4c;
        display: inline-block;
        background: #fff9f9;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        pointer-events: auto;
      }

      .dev-panel button {
        pointer-events: auto;
      }

      /* RECEIPT MODAL OVERLAY STYLES */
      .receipt-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        z-index: 9999;
        backdrop-filter: blur(3px);
        overflow-y: auto;
        padding-bottom: 50px;
      }

      /* RECEIPT CONTAINER STYLES */
      .fis-konteynir {
        background-color: transparent !important;
        width: 100%;
        max-width: 400px;
        margin: 50px auto;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        position: relative;
        min-height: 500px;
        filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.3));
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        color: #222;
        text-align: left;
      }

      /* VINTAGE IMAGE BACKGROUND */
      .arkaplan-sandwich {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        display: flex;
        flex-direction: column;
        pointer-events: none;
      }
      .bg-top {
        height: 150px;
        background: url("/images/top.png") no-repeat center top;
        background-size: 100% 100%;
      }
      .bg-mid {
        flex-grow: 1;
        background: url("/images/middle.png") repeat-y center top;
        background-size: 100% auto;
      }
      .bg-bot {
        height: 100px;
        background: url("/images/bottom.png") no-repeat center bottom;
        background-size: 100% 100%;
      }

      /* SVG MATHEMATICAL GRAPHIC LAYERS */
      .svg-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        pointer-events: none;
      }
      .svg-layer svg {
        width: 100%;
        height: auto;
      }
      .yazi-svg {
        z-index: 2;
      }
      .cizimler-svg {
        z-index: 3;
      }

      /* CLOSE BUTTON */
      .close-receipt-btn {
        position: absolute;
        top: 3px;
        right: 7px;
        background: none;
        border: none;
        font-size: 28px;
        font-weight: bold;
        color: #000000;
        cursor: pointer;
        z-index: 50;
        padding: 0;
      }

      .close-receipt-btn:hover {
        color: red;
        background: none;
      }

      /* RECEIPT CONTENT LAYOUT */
      #fis-icerik {
        position: relative;
        z-index: 20;
        margin-top: 205px; /* Pushed down to make room for your massive SVG title */
        padding: 20px;
      }

      .fis-header-details {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        border-bottom: 2px dashed #ccc;
        padding-bottom: 10px;
        margin-top: 15px;
        color: #555;
      }

      #fis-body {
        position: relative;
        z-index: 10;
        padding: 0px 30px;
        margin-top: 5px;
        flex-grow: 1;
      }

      .kategori-baslik {
        text-align: center;
        border-bottom: 2px solid #dcd0b9;
        margin: 15px 0 10px 0;
        font-size: 12px;
        letter-spacing: 2px;
        color: #8b7d6b;
        padding-bottom: 5px;
      }

      /* ROW ALIGNMENT FOR PRICES */
      .fis-satir {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
        font-size: 14px;
        padding: 5px 0;
      }
      .fis-item-name {
        flex-shrink: 0;
      }
      .fis-dots {
        flex-grow: 1;
        border-bottom: 2px dotted #ccc;
        margin: 0 10px;
        position: relative;
        top: -4px;
      }
      .fis-item-price {
        flex-shrink: 0;
        text-align: right;
      }

      #fis-footer {
        position: relative;
        z-index: 10;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>

          <div id="fis-header" style="text-align: center">
            <p
              style="
                font-size: 18px;
                letter-spacing: 2px;
                margin-bottom: 5px;
                margin-top: 0;
              "
            >
              MEKAN İSMİ
            </p>

            <div class="fis-header-details">
              <span id="receipt-waiter">Garson: Ahmet</span>
              <span id="receipt-table">Masa: 12</span>
            </div>
          </div>
        </div>

        <div id="fis-body"></div>

        <div id="fis-footer">
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 18px;
              border-top: 2px solid #333;
              padding-top: 10px;
              margin: 0 10px;
            "
          >
            <span>TOPLAM</span>
            <span id="toplam-tutar">0.00 TL</span>
          </div>
          <p style="font-size: 10px; color: #8b7d6b; margin-top: 15px">
            www.waiterly.com
          </p>
        </div>
      </div>
    </div>

    <script>
      function openReceiptModal() {
        document.getElementById("receipt-modal-overlay").style.display =
          "block";
        fisDinamikDoldur();
      }

      function closeReceiptModal() {
        document.getElementById("receipt-modal-overlay").style.display = "none";
      }

      document
        .getElementById("receipt-modal-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeReceiptModal();
          }
        });

      function fisDinamikDoldur() {
        const history = JSON.parse(localStorage.getItem("orderHistory")) || [];
        const bodyAlan = document.getElementById("fis-body");
        const toplamLabel = document.getElementById("toplam-tutar");

        if (history.length === 0) {
          bodyAlan.innerHTML =
            "<p style='text-align:center; color:gray;'>Henüz sipariş yok.</p>";
          toplamLabel.innerText = "0.00 TL";
          return;
        }

        bodyAlan.innerHTML = "";
        let genelToplam = 0;

        history.forEach((siparis, index) => {
          genelToplam += siparis.toplamTutar;

          const grupBaslik = document.createElement("div");
          grupBaslik.className = "kategori-baslik";
          grupBaslik.innerText = `SİPARİŞ #${index + 1} - ${siparis.zaman || "Zaman Yok"}`;
          bodyAlan.appendChild(grupBaslik);

          siparis.urunler.forEach((urun) => {
            let itemName = typeof urun === "string" ? urun : urun.quantity + "x " + urun.isim;
            let itemPrice =
              typeof urun === "string" ? "" : urun.fiyat.toFixed(2) + " TL";

            const satir = document.createElement("div");
            satir.className = "fis-satir";

            satir.innerHTML = `
                        <span class="fis-item-name">${itemName}</span>
                        <span class="fis-dots"></span> 
                        <span class="fis-item-price">${itemPrice}</span>
                    `;
            bodyAlan.appendChild(satir);
          });
        });

        toplamLabel.innerText = genelToplam.toFixed(2) + " TL";
      }

      function injectTestOrder() {
        const mockOrders = [
          {
            zaman: new Date().toLocaleTimeString("tr-TR", {
              hour: "2-digit",
              minute: "2-digit",
            }),
            toplamTutar: 1165.5, // Corrected total sum
            urunler: [
              { isim: "Cheeseburger", miktar: 2, fiyat: 300.0 },
              { isim: "Patates Kızartması", miktar: 1, fiyat: 75.5 },
              { isim: "Kola", miktar: 1, fiyat: 50.0 },
              { isim: "Brownie", miktar: 2, fiyat: 200.0 },
              { isim: "Latte", miktar: 3, fiyat: 390.0 },
              { isim: "Bowl", miktar: 1, fiyat: 150.0 },
            ],
          },
        ];
        localStorage.setItem("orderHistory", JSON.stringify(mockOrders));
        fisDinamikDoldur();
        console.log("Mock data injected.");
      }

      function wipeOrderHistory() {
        localStorage.removeItem("orderHistory");
        fisDinamikDoldur();
        console.log("Order history wiped!");
      }
    </script>
