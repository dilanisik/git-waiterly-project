<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sepetim - Waiterly</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-green: #4caf50;
        --primary-orange: #ff9800;
        --danger-red: #f44336;
        --bg-gray: #f4f7f6;
        --text-dark: #333;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: "Poppins", sans-serif;
        text-align: center;
        margin: 0;
        padding: 30px 10px 100px 10px;
        background-color: var(--bg-gray);
        color: var(--text-dark);
      }

      h2 {
        font-weight: 600;
        margin-bottom: 30px;
        color: #2c3e50;
      }

      .btn-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        max-width: 400px;
        margin: 20px auto;
      }

      button {
        width: 100%;
        padding: 14px 24px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 12px;
        border: none;
        transition: all 0.3s ease;
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button:active {
        transform: scale(0.98);
      }
      .btn-main {
        background: var(--primary-green);
        color: white;
      }
      .btn-pay {
        background: var(--primary-orange);
        color: white;
      }
      .btn-outline {
        background: white;
        color: #666;
        border: 1px solid #ddd;
      }
      .btn-danger {
        background: white;
        color: var(--danger-red);
        border: 1px solid var(--danger-red);
      }

      .fis-konteynir {
        background-color: transparent !important;
        width: 100%;
        max-width: 400px;
        margin: 20px auto;
        display: flex;
        flex-direction: column;
        position: relative;
        min-height: 500px;
        filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.15));
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        color: #222;
        text-align: left;
      }

      .arkaplan-sandwich {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        display: flex;
        flex-direction: column;
        pointer-events: none;
      }
      .bg-top {
        height: 150px;
        background: url("/images/top.png") no-repeat center top;
        background-size: 100% 100%;
      }
      .bg-mid {
        flex-grow: 1;
        background: url("/images/middle.png") repeat-y center top;
        background-size: 100% auto;
      }
      .bg-bot {
        height: 100px;
        background: url("/images/bottom.png") no-repeat center bottom;
        background-size: 100% 100%;
      }

      #fis-icerik {
        position: relative;
        z-index: 10;
        padding: 100px 35px 50px 35px;
      }

      .kategori-baslik {
        text-align: center;
        border-bottom: 2px dashed #dcd0b9;
        margin: 25px 0 15px 0;
        font-size: 12px;
        letter-spacing: 2px;
        color: #8b7d6b;
        padding-bottom: 5px;
        text-transform: uppercase;
      }

      .fis-satir {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        font-size: 14px;
      }
      .fis-dots {
        flex-grow: 1;
        border-bottom: 2px dotted #eee;
        margin: 0 8px;
        position: relative;
        top: -4px;
      }

      .cart-controls {
        display: flex;
        justify-content: flex-end;
        margin: 10px 0;
        align-items: center;
        gap: 12px;
      }
      .cart-controls button {
        width: 32px;
        height: 32px;
        padding: 0;
        border-radius: 50%;
        font-size: 18px;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        z-index: 3000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .review-item {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .review-img {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        object-fit: cover;
      }
      .star-rating label {
        font-size: 28px;
        color: #ddd;
        cursor: pointer;
        transition: color 0.2s;
      }
      .star-rating input:checked ~ label,
      .star-rating label:hover,
      .star-rating label:hover ~ label {
        color: #ffd700;
      }
      .star-rating input {
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>Sepetim ve Adisyon</h2>

    <div class="fis-konteynir">
      <div class="arkaplan-sandwich">
        <div class="bg-top"></div>
        <div class="bg-mid"></div>
        <div class="bg-bot"></div>
      </div>
      <div id="fis-icerik">
        <div id="cart-list">
          <p style="text-align: center; opacity: 0.5">
            Adisyon hazırlanıyor...
          </p>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn-main" onclick="siparisVer()">Sipariş Ver 🛎️</button>
      <button class="btn-pay" onclick="baslatOdemeSureci()">
        Ödeme Yap 💳
      </button>
      <button class="btn-danger" onclick="clearCart()">
        Sepeti Temizle 🗑️
      </button>
      <button
        class="btn-outline"
        onclick="window.location.href = '/menu_script.html'"
      >
        Menüye Dön 🍕
      </button>
    </div>

    <div id="onayKutusu" class="modal-overlay">
      <div class="modal-card">
        <p style="font-size: 18px; margin-bottom: 25px">
          Sepeti temizlemek istediğinize emin misiniz?
        </p>
        <div style="display: flex; gap: 10px">
          <button
            class="btn-main"
            onclick="sepetiSilEvet()"
            style="background: #333"
          >
            Evet, Sil
          </button>
          <button class="btn-outline" onclick="sepetiSilHayir()">Vazgeç</button>
        </div>
      </div>
    </div>

    <div id="bildirimKutusu" class="modal-overlay">
      <div class="modal-card">
        <h3 id="bildirimBaslik" style="margin: 0; font-size: 24px">
          ✅ İşlem Tamam!
        </h3>
        <p id="bildirimMesaji" style="margin: 20px 0; color: #666"></p>
        <button id="bildirimButon" class="btn-main" onclick="bildirimiKapat()">
          Harika!
        </button>
      </div>
    </div>

    <div id="paymentModal" class="modal-overlay">
      <div class="modal-card">
        <div id="paymentStep">
          <h3 style="margin-top: 0">Ödeme Yöntemi</h3>
          <p style="color: #666; margin-bottom: 25px">
            Nasıl ödemek istersiniz?
          </p>
          <button
            class="btn-outline"
            onclick="handlePaymentSelection('Nakit')"
            style="margin-bottom: 10px"
          >
            💵 Nakit Ödeme
          </button>
          <button
            class="btn-outline"
            onclick="handlePaymentSelection('Kredi Kartı')"
          >
            💳 Kredi Kartı
          </button>
          <button
            onclick="
              document.getElementById('paymentModal').style.display = 'none'
            "
            style="
              background: none;
              box-shadow: none;
              color: #999;
              margin-top: 15px;
              border: none;
              cursor: pointer;
            "
          >
            Vazgeç
          </button>
        </div>

        <div id="reviewStep" style="display: none">
          <h3>Deneyiminizi Puanlayın</h3>
          <div
            id="reviewProductList"
            style="max-height: 300px; overflow-y: auto; margin: 20px 0"
          ></div>
          <button class="btn-main" onclick="submitReviews()">
            Puanla ve Bitir
          </button>
          <button
            onclick="finalCloseSession()"
            style="
              background: none;
              box-shadow: none;
              color: #999;
              margin-top: 10px;
              border: none;
              cursor: pointer;
            "
          >
            Puanlamadan Geç
          </button>
        </div>
      </div>
    </div>

    <script src="cart.js"></script>
  </body>
</html>
