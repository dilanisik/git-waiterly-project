<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepetim - Waiterly</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">
    <div id = "history-section" style = "display:none; background-color: #f8f9fa; padding : 15px; margin:0 auto 30px auto; width: 80%; max-width: 400px; border-radius: 8px; border : 2px solid #ddd; "> 
        <h2 style = "color:#555; margin-top:0; font-size: 18px;" >📜 Önceki Siparişleriniz</h2>
        <div id="history-list"></div>
        <hr style="border: 1px solid #ccc;">
        <h3 style="margin-bottom: 0; color: #d9534f;">Toplam Harcama: <span id="total-spent">0</span> TL</h3>
    </div>
    <div id="cart-list"></div>

    <br>

    <button onclick = "siparisVer()">Sipariş Ver 🛎️</button>
    <button onclick="clearCart()">Sepeti Temizle</button>
    <button onclick="window.location.href='/'">Anasayfaya Dön 🏠</button>
    <button onclick="window.location.href='/menu_script.html'">Menüye Dön 🍕</button>

    <div id="onayKutusu" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); text-align: center;">
        <p>Sepeti tamamen temizlemek istediğinize emin misiniz?</p>
        <button onclick="sepetiSilEvet()" style="background: rgb(0, 0, 0); color: white; padding: 10px 20px; border: none; border-radius: 5px;">Evet, Sil</button>
        <button onclick="sepetiSilHayir()" style="background: rgb(242, 0, 0); color: white; padding: 10px 20px; border: none; border-radius: 5px;">Hayır, Vazgeç</button>
    </div>
    <div id="bildirimKutusu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background-color: white; padding: 30px; border-radius: 10px; text-align: center; max-width: 90%; width: 400px; box-shadow: 0px 5px 15px rgba(0,0,0,0.3);">
            <h3 style="margin-top: 0; color: #4CAF50;">✅ İletildi!</h3>
            <p id="bildirimMesaji" style="font-size: 16px; margin: 20px 0; line-height: 1.5; text-align: center;">Mesaj</p>
            <button onclick="bildirimiKapat()" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">Harika!</button>
        </div>
    </div>

    <script src="cart.js"></script>
    

    <script>
       //sayfa açılınca sepeti ve geçmişi otomatik çizz
        window.onload =function (){
            renderCart();
            renderHistory();
        };
    </script>
</body>
</html>
